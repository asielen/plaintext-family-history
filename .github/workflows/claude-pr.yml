name: Claude Auto-fix

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR. If there are any CI failures or review comments
            that need addressing, fix them and push the changes. Keep iterating
            until CI passes and all comments are resolved.
          claude_args: "--max-turns 10"
