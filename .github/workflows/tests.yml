name: Tests

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # 3.10 is the suite's documented floor (TOOLING guardrails);
        # 3.14 matches current development machines.
        python-version: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install tool dependencies
        run: python -m pip install -r tools/requirements.txt pytest
      # exiftool and node are deliberately absent: the suite degrades the
      # photo/exif paths gracefully and the browser-companion JS tests are
      # hand-run (documented in browser-companion/README.md).
      - name: Run the suite
        run: python -m pytest tests/ -q
