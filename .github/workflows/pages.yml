name: Deploy example site to Pages

# Publishes the committed example archive's standalone site
# (example-archive/generated/site) as the repo's GitHub Pages demo. Requires
# Settings -> Pages -> Source: "GitHub Actions" to be enabled once, by hand.

on:
  push:
    branches: [master, main]
    paths:
      - 'example-archive/generated/site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: example-archive/generated/site
      - id: deployment
        uses: actions/deploy-pages@d6db90cbd2fc84fd3f395883e952c419ef0e3a55 # v4.0.5
