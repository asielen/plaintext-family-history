# Example-archive config - fictional fixture. Asset roots are internal (and absent;
# the example uses missing-fixture placeholders, see SPEC file-inventory status).

# Site-generation settings (fha site).
site:
  archive_name: The Hartley Family Archive
  hero: coronado-tent-city-postcard.jpg   # banner: a photo path/filename or S-id; a default band shows if unset
  home_person: P-de957bcda1               # the tree "Home" button centers here (defaults to root_person)

roots:
  photos: photos
  documents: documents

# Ahnentafel root: the person at position #1 in the numbering tree.
# All ancestor Ahnentafel numbers are derived from this person via relationship claims.
# Even-numbered folders (002, 004, …) are ancestral couple folders; the root person's
# parents live in folder 002.
root_person: P-0a1b2c3d4e   # Alex James Bradford
