{# Shared <template> blocks for the workbench modals. workbench.js clones one on
   demand, collects its [name] fields into /api/run args, previews a real dry run
   (step rendered from the server's own messages + cli_echo), then applies and
   reloads. Copy that teaches is lifted from the plan-17 wireframes verbatim;
   the CLI echo and diff are no longer mocked - they come from the engines. #}

{# --- generic confirm shell (direct modals fill it from the dry run) --- #}
<template id="tpl-confirm"><div class="wb-step"></div></template>

{# --- publish: rebuild the shareable standalone site --- #}
<template id="tpl-publish" data-wb-verb="site.publish">
  <div class="wb-step">
    <p class="wb-kicker">Rebuild the shareable site</p>
    <h3>Publish a fresh standalone snapshot</h3>
    <p>This rebuilds <code>generated/site/</code> - the self-contained, redacted
      copy that is safe to share. Living people and restricted material are left out.
      Your working files are not touched.</p>
    <div class="wb-modal-foot">
      <button type="button" class="btn" data-wb-close>Cancel</button>
      <button type="button" class="btn btn-primary" data-wb-preview>Preview dry run</button>
    </div>
  </div>
</template>

{# --- claim: edit & accept (all fields) --- #}
<template id="tpl-claim-edit" data-wb-verb="claim.review">
  <div class="wb-step">
    <p class="wb-kicker">Edit before accepting</p>
    <h3>Correct the claim, then accept</h3>
    <div class="wb-field">
      <label>Type</label>
      <select name="claim_type">
        <option value="">(leave unchanged)</option>
        <option>birth</option><option>death</option><option>marriage</option>
        <option>baptism</option><option>burial</option><option>residence</option>
        <option>census</option><option>occupation</option><option>education</option>
        <option>military</option><option>immigration</option><option>divorce</option>
        <option>name</option><option>event</option><option>note</option>
        <option value="" disabled>relationship - not editable here (needs a roles: map; use relate / cooccur)</option>
      </select>
    </div>
    <div class="wb-field">
      <label>Value</label>
      <input type="text" name="value" value="">
    </div>
    <div class="wb-row2">
      <div class="wb-field"><label>Date <span class="wb-optional">(EDTF or plain words)</span></label>
        <input type="text" name="date" value=""></div>
      <div class="wb-field"><label>Place <span class="wb-optional">(text, or resolve to an L-id)</span></label>
        <input type="text" name="place_text" class="wb-target wb-plain" value="">
        <input type="hidden" name="place" data-wb-idfield="place_text">
        <button type="button" class="wb-lookuptoggle" data-wb-lookuptoggle>&#128269; look up a place&hellip;</button>
        <div class="wb-lookup" hidden>
          <input type="text" class="wb-lookup-q" placeholder="Search places&hellip;" data-wb-kind="place">
          <ul class="wb-lookup-results"></ul>
        </div>
      </div>
    </div>
    <div class="wb-field">
      <label>People <span class="wb-optional">(pick from the search, or paste P-ids comma-separated)</span></label>
      <input type="text" name="persons" class="wb-target wb-multi" data-wb-refmode="id" value="">
      <button type="button" class="wb-lookuptoggle" data-wb-lookuptoggle>&#128269; look up a person&hellip;</button>
      <div class="wb-lookup" hidden>
        <input type="text" class="wb-lookup-q" placeholder="Search people&hellip;" data-wb-kind="person">
        <ul class="wb-lookup-results"></ul>
      </div>
    </div>
    <div class="wb-field">
      <label>Status</label>
      <select name="status">
        <option value="" selected>- leave unchanged -</option>
        <option value="accepted">accepted</option>
        <option value="needs-review">needs-review</option>
        <option value="disputed">disputed</option>
        <option value="rejected">rejected</option>
      </select>
    </div>
    <div class="wb-modal-foot">
      <button type="button" class="btn" data-wb-close>Cancel</button>
      <button type="button" class="btn btn-primary" data-wb-preview>Preview dry run</button>
    </div>
  </div>
</template>

{# --- co-occurrence: record a social relationship --- #}
<template id="tpl-cooccur" data-wb-verb="confirm.cooccur">
  <div class="wb-step">
    <p class="wb-kicker">Record a social tie</p>
    <h3>Record relationship</h3>
    <div class="wb-field">
      <label>Relationship subtype</label>
      <select name="subtype">
        <option value="neighbor" selected>neighbor</option>
        <option value="friend">friend</option>
        <option value="associate">associate</option>
      </select>
    </div>
    <p class="note">Social ties only - a suspected <em>sibling</em> relationship belongs in a
      hypothesis, not here.</p>
    <div class="wb-modal-foot">
      <button type="button" class="btn" data-wb-close>Cancel</button>
      <button type="button" class="btn btn-primary" data-wb-preview>Preview dry run</button>
    </div>
  </div>
</template>

{# --- mint a person (stub) --- #}
<template id="tpl-mint" data-wb-verb="person.new" data-wb-build="person_new">
  <div class="wb-step">
    <p class="wb-kicker">Give this person a page</p>
    <h3>Mint a stub record</h3>
    <div class="wb-field"><label>Name</label><input type="text" name="name" value=""></div>
    <div class="wb-field">
      <label>Sex / gender <span class="wb-optional">(optional)</span></label>
      <select name="sex">
        <option selected>Unknown</option><option>Male</option><option>Female</option>
        <option>Intersex</option><option value="Other">Other&hellip;</option>
      </select>
    </div>
    <div class="wb-field" data-wb-showif="sex:Other">
      <label>Gender <span class="wb-optional">(free text)</span></label>
      <input type="text" name="gender_other" value="">
    </div>
    <div class="wb-row2">
      <div class="wb-field"><label>Born <span class="wb-optional">(optional, unsourced)</span></label>
        <input type="text" name="birth" value=""></div>
      <div class="wb-field"><label>Birth place <span class="wb-optional">(optional)</span></label>
        <input type="text" name="birth_place" value=""></div>
    </div>
    <div class="wb-row2">
      <div class="wb-field"><label>Died <span class="wb-optional">(optional, unsourced)</span></label>
        <input type="text" name="death" value=""></div>
      <div class="wb-field"><label>Death place <span class="wb-optional">(optional)</span></label>
        <input type="text" name="death_place" value=""></div>
    </div>
    <p class="note">Opened from the <em>+</em> next to a name the archive's claims already
      mention? The stub is written under that person's existing P-id, so every claim naming
      them keeps pointing at them. Opened from a blank "Add a person&hellip;"? A brand-new P-id
      is minted - an independent new person. Either way the stub gives them a page and a home
      for notes and stories, and any vitals you add here are <em>unsourced</em> (family
      knowledge) until a record backs them.</p>
    <div class="wb-modal-foot">
      <button type="button" class="btn" data-wb-close>Cancel</button>
      <button type="button" class="btn btn-primary" data-wb-preview>Preview dry run</button>
    </div>
  </div>
</template>

{# --- add a family member (relate; mint separately) --- #}
<template id="tpl-add-family" data-wb-verb="person.add_family" data-wb-build="add_family">
  <div class="wb-step">
    <p class="wb-kicker">Add a family member</p>
    <h3>Who, and how do you know?</h3>
    <div class="wb-field">
      <label>Full name</label>
      <input type="text" name="name" class="wb-target wb-plain" value="" placeholder="Type a name - or pick an existing person from the search below">
      <input type="hidden" name="target_id" data-wb-idfield="name">
      <button type="button" class="wb-lookuptoggle" data-wb-lookuptoggle>&#128269; already in the archive? link to the existing person instead</button>
      <div class="wb-lookup" hidden>
        <input type="text" class="wb-lookup-q" placeholder="Search existing people&hellip;" data-wb-kind="person">
        <ul class="wb-lookup-results"></ul>
      </div>
    </div>
    <div class="wb-field">
      <label>Relation to this person</label>
      <select name="relation_type">
        <option>parent</option><option selected>sibling</option>
        <option>spouse</option><option>child</option>
      </select>
    </div>
    <div class="wb-field">
      <label>Sex / gender <span class="wb-optional">(optional)</span></label>
      <select name="sex">
        <option selected>Unknown</option><option>Male</option><option>Female</option>
        <option>Intersex</option><option value="Other">Other&hellip;</option>
      </select>
    </div>
    <div class="wb-field" data-wb-showif="sex:Other">
      <label>Gender <span class="wb-optional">(free text)</span></label>
      <input type="text" name="gender_other" value="">
    </div>
    <div class="wb-row2">
      <div class="wb-field"><label>Born <span class="wb-optional">(optional, unsourced)</span></label>
        <input type="text" name="birth" value=""></div>
      <div class="wb-field"><label>Birth place <span class="wb-optional">(optional)</span></label>
        <input type="text" name="birth_place" value=""></div>
    </div>
    <div class="wb-row2">
      <div class="wb-field"><label>Died <span class="wb-optional">(optional, unsourced)</span></label>
        <input type="text" name="death" value=""></div>
      <div class="wb-field"><label>Death place <span class="wb-optional">(optional)</span></label>
        <input type="text" name="death_place" value=""></div>
    </div>
    <p class="note">A typed name mints a new stub AND records the tie in one go; a pick from
      the search links the existing person instead (their record is left alone - the vitals
      fields above only apply to a brand-new stub). Either way the tie itself is recorded as a
      <em>hypothesis</em> on this person's record: no record names it yet. When a record proves
      it, the hypothesis graduates to a sourced relationship claim (accepted in Review, like
      the census ones were).</p>
    <div class="wb-modal-foot">
      <button type="button" class="btn" data-wb-close>Cancel</button>
      <button type="button" class="btn btn-primary" data-wb-preview>Preview dry run</button>
    </div>
  </div>
</template>

{# --- milestone (Born / Married / Died / Baptized / Buried) --- #}
<template id="tpl-milestone" data-wb-verb="claim.new" data-wb-build="milestone">
  <div class="wb-step">
    <p class="wb-kicker">Add or edit a milestone - the Born / Married / Died lines</p>
    <h3>A life event that belongs at the top</h3>
    <div class="wb-field">
      <label>Milestone</label>
      <select name="mtype">
        <option>Born</option><option>Died</option><option>Married</option>
        <option>Baptized</option><option>Buried</option>
      </select>
    </div>
    <div class="wb-field" data-wb-showif="mtype:Married">
      <label>Spouse <span class="wb-optional">(pick from the lookup, or paste a P-id)</span></label>
      <input type="text" name="mspouse" class="wb-target" data-wb-refmode="id" value="">
      <button type="button" class="wb-lookuptoggle" data-wb-lookuptoggle>&#128269; look up a person&hellip;</button>
      <div class="wb-lookup" hidden>
        <input type="text" class="wb-lookup-q" placeholder="Search people&hellip;" data-wb-kind="person">
        <ul class="wb-lookup-results"></ul>
      </div>
    </div>
    <div class="wb-row2">
      <div class="wb-field"><label>Date <span class="wb-optional">(EDTF or plain)</span></label>
        <input type="text" name="mdate" value=""></div>
      <div class="wb-field"><label>Place <span class="wb-optional">(optional)</span></label>
        <input type="text" name="mplace" class="wb-target wb-plain" value="">
        <input type="hidden" name="mplace_id" data-wb-idfield="mplace">
        <button type="button" class="wb-lookuptoggle" data-wb-lookuptoggle>&#128269; look up a place&hellip;</button>
        <div class="wb-lookup" hidden>
          <input type="text" class="wb-lookup-q" placeholder="Search places&hellip;" data-wb-kind="place">
          <ul class="wb-lookup-results"></ul>
        </div>
      </div>
    </div>
    <div class="wb-field">
      <label>Source</label>
      <select name="msource">
        <option value="" selected>- unsourced (family knowledge) -</option>
        {% if person is defined %}{% for s in (person.milestone_sources or []) %}
        <option value="{{ s.id }}">{{ s.id }} - {{ s.title }}</option>
        {% endfor %}{% endif %}
        <option value="__paste__">paste an S-id&hellip;</option>
      </select>
      <p class="wb-hint">Pick one of this person's cited sources, or paste an S-id.
        A <strong>sourced</strong> milestone also becomes a claim - so it shows in the Timeline,
        with a footnote. An <strong>unsourced</strong> Born/Died is just the summary line
        (family knowledge, no footnote); an unsourced Married is recorded as the spouse hypothesis.</p>
    </div>
    <div class="wb-field" data-wb-showif="msource:__paste__">
      <label>Source S-id</label><input type="text" name="msource_id" value="">
    </div>
    <div class="wb-modal-foot">
      <button type="button" class="btn" data-wb-close>Cancel</button>
      <button type="button" class="btn btn-primary" data-wb-preview>Preview dry run</button>
    </div>
  </div>
</template>

{# --- add a timeline event (claim.new) --- #}
<template id="tpl-add-event" data-wb-verb="claim.new" data-wb-build="add_event">
  <div class="wb-step">
    <p class="wb-kicker">Add a timeline event</p>
    <h3>Events are claims - which source says so?</h3>
    <div class="wb-field">
      <label>Source</label>
      <select name="source_pick">
        {% if person is defined %}{% for s in (person.milestone_sources or []) %}
        <option value="{{ s.id }}"{% if loop.first %} selected{% endif %}>{{ s.id }} - {{ s.title }}</option>
        {% endfor %}{% endif %}
        <option value="__other__">another source&hellip;</option>
      </select>
      <p class="wb-hint">This person's cited sources, by title - or pick "another source" to
        search the whole archive / paste an S-id.</p>
    </div>
    <div class="wb-field" data-wb-showif="source_pick:__other__">
      <label>Source S-id</label>
      <input type="text" name="source_manual" class="wb-target" data-wb-refmode="id" value="">
      <button type="button" class="wb-lookuptoggle" data-wb-lookuptoggle>&#128269; look up a source&hellip;</button>
      <div class="wb-lookup" hidden>
        <input type="text" class="wb-lookup-q" placeholder="Search sources&hellip;" data-wb-kind="source">
        <ul class="wb-lookup-results"></ul>
      </div>
    </div>
    <div class="wb-field">
      <label>Type</label>
      <select name="claim_type">
        <option>birth</option><option>death</option><option>marriage</option>
        <option>residence</option><option>census</option><option selected>occupation</option>
        <option>education</option><option>military</option><option>immigration</option>
        <option>event</option><option>note</option>
      </select>
    </div>
    <div class="wb-field"><label>What happened</label><input type="text" name="value" value=""></div>
    <div class="wb-row2">
      <div class="wb-field"><label>Date (EDTF)</label><input type="text" name="date" value=""></div>
      <div class="wb-field"><label>Place <span class="wb-optional">(text, or resolve to an L-id)</span></label>
        <input type="text" name="place_text" class="wb-target wb-plain" value="">
        <input type="hidden" name="place" data-wb-idfield="place_text">
        <button type="button" class="wb-lookuptoggle" data-wb-lookuptoggle>&#128269; look up a place&hellip;</button>
        <div class="wb-lookup" hidden>
          <input type="text" class="wb-lookup-q" placeholder="Search places&hellip;" data-wb-kind="place">
          <ul class="wb-lookup-results"></ul>
        </div>
      </div>
    </div>
    <div class="wb-field">
      <label>People <span class="wb-optional">(P-ids, comma-separated)</span></label>
      <input type="text" name="persons" class="wb-target wb-multi" data-wb-refmode="id" value="">
      <button type="button" class="wb-lookuptoggle" data-wb-lookuptoggle>&#128269; look up a person&hellip;</button>
      <div class="wb-lookup" hidden>
        <input type="text" class="wb-lookup-q" placeholder="Search people&hellip;" data-wb-kind="person">
        <ul class="wb-lookup-results"></ul>
      </div>
    </div>
    <p class="wb-hint">No record at all? Then it isn't a timeline event yet - put it in
      Research Notes (or a hypothesis) until a source backs it. That rule is what keeps every
      fact on this site traceable to evidence. You entered it deliberately - you are the gate.</p>
    <div class="wb-modal-foot">
      <button type="button" class="btn" data-wb-close>Cancel</button>
      <button type="button" class="btn btn-primary" data-wb-preview>Preview dry run</button>
    </div>
  </div>
</template>

{# --- add a claim on a source page (claim.new) --- #}
<template id="tpl-add-claim" data-wb-verb="claim.new">
  <div class="wb-step">
    <p class="wb-kicker">Add a claim to this source</p>
    <h3>What does this record say?</h3>
    <div class="wb-field">
      <label>Type</label>
      <select name="claim_type">
        <option>birth</option><option>death</option><option>marriage</option>
        <option>baptism</option><option>burial</option><option selected>residence</option>
        <option>census</option><option>occupation</option><option>education</option>
        <option>military</option><option>immigration</option><option>divorce</option>
        <option>name</option><option>event</option><option>note</option>
      </select>
    </div>
    <div class="wb-field"><label>The assertion, in plain words</label><input type="text" name="value" value=""></div>
    <div class="wb-row2">
      <div class="wb-field"><label>Date <span class="wb-optional">(optional)</span></label><input type="text" name="date" value=""></div>
      <div class="wb-field"><label>Place <span class="wb-optional">(text, or resolve to an L-id)</span></label>
        <input type="text" name="place_text" class="wb-target wb-plain" value="">
        <input type="hidden" name="place" data-wb-idfield="place_text">
        <button type="button" class="wb-lookuptoggle" data-wb-lookuptoggle>&#128269; look up a place&hellip;</button>
        <div class="wb-lookup" hidden>
          <input type="text" class="wb-lookup-q" placeholder="Search places&hellip;" data-wb-kind="place">
          <ul class="wb-lookup-results"></ul>
        </div>
      </div>
    </div>
    <div class="wb-field">
      <label>People <span class="wb-optional">(P-ids, comma-separated)</span></label>
      <input type="text" name="persons" class="wb-target wb-multi" data-wb-refmode="id" value="">
      <button type="button" class="wb-lookuptoggle" data-wb-lookuptoggle>&#128269; look up a person&hellip;</button>
      <div class="wb-lookup" hidden>
        <input type="text" class="wb-lookup-q" placeholder="Search people&hellip;" data-wb-kind="person">
        <ul class="wb-lookup-results"></ul>
      </div>
    </div>
    <div class="wb-field">
      <label>Status</label>
      <select name="status"><option value="accepted" selected>accepted</option><option value="suggested">suggested</option></select>
    </div>
    <p class="wb-hint">You entered it deliberately, so it lands <code>accepted</code> - you are
      the gate. Choose <em>suggested</em> to route it through Review instead.</p>
    <div class="wb-modal-foot">
      <button type="button" class="btn" data-wb-close>Cancel</button>
      <button type="button" class="btn btn-primary" data-wb-preview>Preview dry run</button>
    </div>
  </div>
</template>

{# --- edit a prose section (biography) --- #}
<template id="tpl-edit-bio" data-wb-verb="person.edit">
  <div class="wb-step">
    <p class="wb-kicker">Edit biography - the whole section, as markdown</p>
    <h3>Your prose, its citations, and its photo</h3>
    <input type="hidden" name="section" value="biography">
    <div class="wb-field">
      <label>## Biography</label>
      <textarea name="text" class="wb-target" style="min-height:12rem">{{ person.biography_raw if person is defined else '' }}</textarea>
      <button type="button" class="wb-lookuptoggle" data-wb-lookuptoggle>&#128269; insert a link (person / source / place) at the cursor&hellip;</button>
      <div class="wb-lookup" hidden>
        <input type="text" class="wb-lookup-q" placeholder="Search the archive by name&hellip;">
        <ul class="wb-lookup-results"></ul>
      </div>
      <p class="wb-bracket-warn" hidden></p>
    </div>
    <p class="note">The <code>![[photo.jpg|caption]]</code> line <em>is</em> the embedded picture -
      edit its caption, swap the filename, or delete the line to remove it.
      <code>[[P-&hellip;]]</code> / <code>[[S-&hellip;]]</code> / <code>[[C-&hellip;]]</code> are the links behind the footnote numbers;
      <code>[[L-&hellip;|Fairview]]</code> is a place. Use the lookup so you never have to remember an ID.
      Serve replaces only this section, never the whole file;
      frontmatter, claims and other sections are untouched.</p>
    <div class="wb-modal-foot">
      <button type="button" class="btn" data-wb-close>Cancel</button>
      <button type="button" class="btn btn-primary" data-wb-preview>Preview dry run</button>
    </div>
  </div>
</template>

{# --- append a research note --- #}
<template id="tpl-add-research" data-wb-verb="person.note">
  <div class="wb-step">
    <p class="wb-kicker">Append-only - never overwrites</p>
    <h3>Add a research note</h3>
    <input type="hidden" name="section" value="research">
    <div class="wb-field">
      <label>What did you find, or what should be chased next?</label>
      <textarea name="text"></textarea>
    </div>
    <div class="wb-modal-foot">
      <button type="button" class="btn" data-wb-close>Cancel</button>
      <button type="button" class="btn btn-primary" data-wb-preview>Preview dry run</button>
    </div>
  </div>
</template>

{# --- append a story --- #}
<template id="tpl-note" data-wb-verb="person.note">
  <div class="wb-step">
    <p class="wb-kicker">Append-only - never overwrites</p>
    <h3>Add a story or note</h3>
    <input type="hidden" name="section" value="stories">
    <div class="wb-field"><label>Your words, kept as yours</label><textarea name="text"></textarea></div>
    <div class="wb-modal-foot">
      <button type="button" class="btn" data-wb-close>Cancel</button>
      <button type="button" class="btn btn-primary" data-wb-preview>Preview dry run</button>
    </div>
  </div>
</template>

{# --- set the living flag --- #}
<template id="tpl-living" data-wb-verb="person.set-living">
  <div class="wb-step">
    <p class="wb-kicker">One-field record edit</p>
    <h3>Is {{ person.name if person is defined else 'this person' }} living?</h3>
    <div class="wb-field"><div class="wb-radio">
      <label><input type="radio" name="value" value="false"> deceased</label>
      <label><input type="radio" name="value" value="true"> living</label>
      <label><input type="radio" name="value" value="unknown"> unknown</label>
    </div></div>
    <p class="note">This flag drives privacy: people marked <code>living: true</code> (or
      unknown) are redacted from anything exported for sharing.</p>
    <div class="wb-modal-foot">
      <button type="button" class="btn" data-wb-close>Cancel</button>
      <button type="button" class="btn btn-primary" data-wb-preview>Preview dry run</button>
    </div>
  </div>
</template>

{# --- set the profile portrait --- #}
<template id="tpl-set-photo" data-wb-verb="person.set-profile-photo">
  <div class="wb-step">
    <p class="wb-kicker">One-field record edit</p>
    <h3>Which photo is their portrait?</h3>
    <div class="wb-field">
      <label>Photo</label>
      <input type="text" name="value" class="wb-target" data-wb-refmode="id" value="">
      <button type="button" class="wb-lookuptoggle" data-wb-lookuptoggle>&#128269; look up a photo source&hellip;</button>
      <div class="wb-lookup" hidden>
        <input type="text" class="wb-lookup-q" placeholder="Search photo sources&hellip;" data-wb-kind="source">
        <ul class="wb-lookup-results"></ul>
      </div>
    </div>
    <p class="note">A filename, path, or S-id also works typed directly. Shown on this
      person's page and as their small square in the family tree.</p>
    <div class="wb-modal-foot">
      <button type="button" class="btn" data-wb-close>Cancel</button>
      <button type="button" class="btn btn-primary" data-wb-preview>Preview dry run</button>
    </div>
  </div>
</template>

{# --- upload a file into the inbox (multipart, not /api/run) --- #}
<template id="tpl-upload">
  <div class="wb-step">
    <p class="wb-kicker">Add to the inbox</p>
    <h3>File the drop - and say what it is</h3>
    <div class="wb-field"><label>File <span class="wb-optional">(rename it here if "IMG_2043.jpg" won't mean anything later)</span></label>
      <input type="text" name="filename" value=""></div>
    <div class="wb-field">
      <label>What is it? (optional, but future-you says thanks)</label>
      <textarea name="what" style="min-height:4rem"></textarea>
    </div>
    <div class="wb-field"><label>Who's involved / when (optional)</label><input type="text" name="who" value=""></div>

      &rarr; inbox/<span data-wb-sub-stem="filename"></span>.notes.md
      <span class="wb-optional">(your context, saved as a sidecar note - written only when you give one)</span></p>

    <div class="wb-cli"><code># drag into inbox/ in Explorer + a text note beside it - no command needed</code></div>
    <div class="wb-modal-foot">
      <button type="button" class="btn" data-wb-close>Cancel</button>
      <button type="button" class="btn btn-primary" data-wb-upload-apply>Add to inbox</button>
    </div>

{# --- register a photo by its path (capture.path) --- #}
<template id="tpl-bypath" data-wb-verb="capture.path">

      <button type="button" class="btn" data-wb-close>Cancel</button>
      <button type="button" class="btn btn-primary" data-wb-preview>Preview dry run</button>
    </div>
  </div>
</template>

{# --- file an inbox item as a source (process Stage A) --- #}
<template id="tpl-process" data-wb-verb="process.file">
  <div class="wb-step">
    <p class="wb-kicker">File it as a source (Stage A)</p>
    <h3>Deterministic filing only</h3>
    <p>Mint the identity, put the document in its place, scaffold the record. No reading,
      no guessing.</p>
    <div class="wb-field">
      <label>Source type</label>
      <select name="source_type">
        <option>letter</option><option>census</option><option>vital-record</option>
        <option>newspaper</option><option>photo</option><option>interview</option>
        <option>book</option><option selected>other</option>
      </select>
    </div>
    <p class="wb-hint">What the button will <em>not</em> do: read the evidence and draft claims
      from it. That judgment step stays in the AI lane - ask Claude to "process the inbox"
      (the <code>process-source</code> skill), or add claims yourself on the new source page.</p>
    <div class="wb-modal-foot">
      <button type="button" class="btn" data-wb-close>Cancel</button>
      <button type="button" class="btn btn-primary" data-wb-preview>Preview dry run</button>
    </div>
  </div>
</template>

{# --- file a bundle as ONE source (process Stage A, bundle variant) --- #}
<template id="tpl-process-bundle" data-wb-verb="process.file">
  <div class="wb-step">
    <p class="wb-kicker">File the bundle as one source (Stage A)</p>
    <h3>One S-id for files that belong together</h3>
    <p>The whole folder becomes <em>one</em> source: the primary file carries the record,
      the notes ride along as its sidecar, and the folder itself dissolves. One click,
      one source.</p>
    <div class="wb-field">
      <label>Source type</label>
      <select name="source_type">
        <option>letter</option><option>census</option><option>vital-record</option>
        <option>newspaper</option><option>photo</option><option selected>interview</option>
        <option>book</option><option>other</option>
      </select>
    </div>
    <p class="wb-hint">A recording + transcript bundle usually files as <em>interview</em>.
      Once filed, extracting what the transcript actually says is exactly what the
      <code>mine-transcript</code> skill is for - ask Claude to "mine this interview" after
      the filing lands.</p>
    <div class="wb-modal-foot">
      <button type="button" class="btn" data-wb-close>Cancel</button>
      <button type="button" class="btn btn-primary" data-wb-preview>Preview dry run</button>
    </div>
  </div>
</template>
