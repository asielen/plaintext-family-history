<!DOCTYPE html>
<!-- Anonymized Ancestry image-viewer page snippet (EX5 shape) for fha capture
     recipe tests. No og:title; the detail panel is a CSS grid of grid-cell
     divs (header row of labels + aligned data rows, with the person split
     across Surname/Given Name columns), and the first <h1> is a tree-hint
     prompt that must not become the title. Fictional people. -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>1940 United States Federal Census - Ancestry&#174;</title>
  <meta property="og:site_name" content="Ancestry">
  <link rel="canonical" href="https://www.ancestry.com/imageviewer/collections/2442/images/m-t0627-00211-00567">
</head>
<body>
  <h1>Does Calvin match the person in your tree?</h1>
  <div class="grid-container">
    <div class="grid-row indexPanelHeaderRow">
      <div class="grid-cell">Line Number</div>
      <div class="grid-cell">Surname</div>
      <div class="grid-cell">Given Name</div>
      <div class="grid-cell">Relation to Head of House</div>
      <div class="grid-cell">Age</div>
      <div class="grid-cell">Marital Status</div>
    </div>
    <div class="grid-row grid-column white-bg">
      <div class="grid-cell">1</div>
      <div class="grid-cell"><span>Hartley</span></div>
      <div class="grid-cell">Calvin</div>
      <div class="grid-cell">Head</div>
      <div class="grid-cell">52</div>
      <div class="grid-cell">Married</div>
    </div>
    <div class="grid-row grid-column white-bg">
      <div class="grid-cell">2</div>
      <div class="grid-cell">Hartley</div>
      <div class="grid-cell">Edith</div>
      <div class="grid-cell">Daughter</div>
      <div class="grid-cell">19</div>
      <div class="grid-cell">Single</div>
    </div>
  </div>
</body>
</html>
