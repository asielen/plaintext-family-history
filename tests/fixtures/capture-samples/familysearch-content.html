<!DOCTYPE html>
<!-- Anonymized FamilySearch record/content-page snippet (EX13 shape) for fha
     capture recipe tests. No og:/JSON-LD; the React fact panel renders facts
     as "Label: Value" text, the subject as Given Name/Surname, and the
     household under "Others on This Record" with the names in data-testid
     attributes (the stable hook). Fictional people. -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Wisconsin, 1860 Federal Census</title>
  <meta property="og:site_name" content="FamilySearch">
  <link rel="canonical" href="https://www.familysearch.org/ark:/61903/3:1:XXYY-ZZZ">
</head>
<body>
  <h1>Wisconsin, 1860 Federal Census</h1>
  <section class="essentialCss_x1">
    <h2>Essential Information</h2>
    <div>Given Name: William W</div>
    <div>Surname: Church</div>
    <div>Sex: Male</div>
    <div>Age: 20</div>
  </section>
  <section class="relCss_y2">
    <h2>Relationships</h2>
    <h3>Others on This Record</h3>
    <div role="button" data-testid="Caleb C Church"></div>
    <div role="button" data-testid="Chastina Church"></div>
    <div role="button" data-testid="Sarah Church"></div>
    <h3>Events</h3>
    <div>Census Date: 1860</div>
    <div>Place: Madison, Dane, Wisconsin</div>
  </section>
</body>
</html>
